<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiniType — type checker visualizer</title>
<style>
  :root { --bg:#0f1221; --panel:#1a1f36; --ink:#e7e9f3; --muted:#9aa3c7;
          --ok:#3ddc97; --err:#ff6b6b; --accent:#6ea8fe; --line:#2a3157; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--ink); }
  header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex;
           align-items:baseline; gap:14px; }
  header h1 { font-size:18px; margin:0; }
  header .sub { color:var(--muted); font-size:13px; }
  .wrap { display:grid; grid-template-columns: 1fr 1fr; gap:16px; padding:16px; }
  @media (max-width: 900px){ .wrap{ grid-template-columns:1fr; } }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px;
           padding:12px; }
  .panel h2 { font-size:13px; text-transform:uppercase; letter-spacing:.06em;
              color:var(--muted); margin:0 0 8px; }
  textarea { width:100%; height:320px; resize:vertical; background:#0c0f1c; color:var(--ink);
             border:1px solid var(--line); border-radius:8px; padding:10px;
             font:13px/1.5 "JetBrains Mono",Consolas,monospace; }
  .row { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0; align-items:center; }
  button { background:var(--accent); color:#0b1020; border:0; border-radius:7px;
           padding:8px 14px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--muted); border:1px solid var(--line);
                 font-weight:500; }
  button:hover { filter:brightness(1.08); }
  .banner { padding:10px 12px; border-radius:8px; font-weight:600; margin-bottom:10px; }
  .banner.ok  { background:rgba(61,220,151,.12); color:var(--ok);  border:1px solid var(--ok); }
  .banner.err { background:rgba(255,107,107,.12); color:var(--err); border:1px solid var(--err); }
  .errlist { list-style:none; margin:0; padding:0; }
  .errlist li { padding:6px 8px; border-radius:6px; cursor:pointer; font-family:monospace;
                color:#ffb4b4; }
  .errlist li:hover { background:rgba(255,107,107,.12); }
  .tokens { display:flex; flex-wrap:wrap; gap:6px; }
  .tok { border:1px solid var(--line); border-radius:6px; padding:2px 7px; font-family:monospace;
         font-size:12px; }
  .tok b { color:var(--accent); }
  .tree { font-family:monospace; font-size:13px; }
  .tree details { margin-left:14px; }
  .tree summary { cursor:pointer; color:var(--accent); }
  .tree .token { margin-left:14px; color:var(--ok); }
  .tree .leafrule { margin-left:14px; color:var(--accent); }
  .hint { color:var(--muted); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>MiniType</h1>
  <span class="sub">type-checker visualizer · lexer → parser → SDD type check</span>
</header>

<div class="wrap">
  <!-- LEFT: editor -->
  <div class="panel">
    <h2>Source program</h2>
    <textarea id="code" spellcheck="false"></textarea>
    <div class="row">
      <button id="run">▶ Analyze <span class="hint">(Ctrl+Enter)</span></button>
      <button class="ghost" data-ex="arith">arithmetic</button>
      <button class="ghost" data-ex="pointers">pointers</button>
      <button class="ghost" data-ex="records">records</button>
      <button class="ghost" data-ex="errors">type errors</button>
    </div>
    <div class="panel" style="background:#0c0f1c">
      <h2>Result</h2>
      <div id="banner" class="banner ok">—</div>
      <ul id="errors" class="errlist"></ul>
    </div>
  </div>

  <!-- RIGHT: tree + tokens -->
  <div class="panel">
    <h2>Parse tree <span class="hint">(click a node to collapse)</span></h2>
    <div id="tree" class="tree"></div>
    <h2 style="margin-top:14px">Tokens</h2>
    <div id="tokens" class="tokens"></div>
  </div>
</div>

<script>
// ---- sample programs (quick-load buttons) --------------------------------
const EXAMPLES = {
  arith:
`int gi = 2 + 3 * 4;
int compute() {
  int a = 10;
  double b = 3.14;
  int e = (int) b;      // cast double -> int
  return a * 2 - 5 + e;
}`,
  pointers:
`int demo() {
  int   a  = 7;
  int*  p  = &a;        // address-of
  int** pp = &p;
  return *(*pp);        // dereference twice
}`,
  records:
`struct Point { int x; int y; };
int usePoint() {
  Point p;
  p.x = 3;
  p.y = 4;
  return p.x + p.y;
}`,
  errors:
`int add(int a, int b) { return a + b; }
int f() {
  char c = 'x';
  int bad1 = 1 + c;      // int + char
  int bad2 = add(1, 2.0); // wrong argument type
  if (5) { return 0; }    // condition not bool
  return undefined;       // undefined name
}`
};

const $ = (id) => document.getElementById(id);
const codeEl = $('code');

// ---- analyze: POST the source, render the JSON response ------------------
async function analyze() {
  const res = await fetch('/api/check', { method:'POST', body: codeEl.value });
  const data = await res.json();
  renderResult(data);
  renderTree(data.tree);
  renderTokens(data.tokens);
}

function renderResult(data) {
  const banner = $('banner');
  const errs = [...data.syntaxErrors, ...data.typeErrors];
  if (data.ok) {
    banner.className = 'banner ok';
    banner.textContent = '✓ Type checking succeeded — no errors';
  } else {
    banner.className = 'banner err';
    banner.textContent = '✗ ' + errs.length + ' error' + (errs.length === 1 ? '' : 's');
  }
  const list = $('errors');
  list.innerHTML = '';
  for (const e of errs) {
    const li = document.createElement('li');
    li.textContent = e;
    li.onclick = () => jumpToError(e);   // click an error -> select that line
    list.appendChild(li);
  }
}

// turn "12:5: error: ..." into a selection of line 12 in the editor
function jumpToError(msg) {
  const m = msg.match(/^(\d+):(\d+):/);
  if (!m) return;
  const line = parseInt(m[1], 10);
  const lines = codeEl.value.split('\n');
  let start = 0;
  for (let i = 0; i < line - 1 && i < lines.length; i++) start += lines[i].length + 1;
  const end = start + (lines[line - 1] ? lines[line - 1].length : 0);
  codeEl.focus();
  codeEl.setSelectionRange(start, end);
}

// ---- parse tree: nested <details> so each node collapses -----------------
function renderTree(node) {
  const host = $('tree');
  host.innerHTML = '';
  if (!node) { host.textContent = '(no tree — the program did not parse)'; return; }
  host.appendChild(nodeEl(node));
}

function nodeEl(node) {
  if (node.kind === 'token') {
    const s = document.createElement('div');
    s.className = 'token';
    s.textContent = "'" + node.label + "'";
    return s;
  }
  if (!node.children || node.children.length === 0) {
    const s = document.createElement('div');
    s.className = 'leafrule';
    s.textContent = node.label;
    return s;
  }
  const d = document.createElement('details');
  d.open = true;
  const sum = document.createElement('summary');
  sum.textContent = node.label;
  d.appendChild(sum);
  for (const c of node.children) d.appendChild(nodeEl(c));
  return d;
}

function renderTokens(tokens) {
  const host = $('tokens');
  host.innerHTML = '';
  for (const t of (tokens || [])) {
    const span = document.createElement('span');
    span.className = 'tok';
    span.innerHTML = '<b>' + escapeHtml(t.type) + '</b> ' + escapeHtml(t.text);
    host.appendChild(span);
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- wiring --------------------------------------------------------------
$('run').onclick = analyze;
codeEl.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); analyze(); }
});
document.querySelectorAll('button[data-ex]').forEach(b => {
  b.onclick = () => { codeEl.value = EXAMPLES[b.dataset.ex]; analyze(); };
});

// load a default example and analyze on first paint
codeEl.value = EXAMPLES.arith;
analyze();
</script>
</body>
</html>
